name: Run checklist page patch

on:
  push:
    paths:
      - 'scripts/apply_checklist_fix.py'
      - '.github/workflows/run-checklist-fix.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply checklist fix
        run: python3 scripts/apply_checklist_fix.py
      - name: Commit page changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html style.css
          git commit -m "Fix checklist layout on lesson page"
          git push
