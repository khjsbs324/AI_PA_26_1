<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT & Gemini 프롬프트 수업</title>
  <style>
    body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:#f8fbff;color:#111827}
    .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .loading-box{max-width:520px;padding:32px;border-radius:24px;background:#fff;box-shadow:0 16px 40px rgba(23,24,33,.08)}
    .loading-box h1{margin:0 0 12px;font-size:28px;letter-spacing:-.04em}
    .loading-box p{margin:0;color:#596276;line-height:1.7}
  </style>
</head>
<body>
  <div class="loading">
    <div class="loading-box">
      <h1>수업페이지를 불러오는 중입니다</h1>
      <p>기존 수업페이지 내용을 유지하고 브랜드 기획 실습 프롬프트 섹션을 추가합니다.</p>
    </div>
  </div>

  <script>
    (async function(){
      const originalUrl = 'https://raw.githubusercontent.com/khjsbs324/AI_PA_26_1/bdf6215a0cc32f12b7b86f1651b090c8aac4148f/index.html';
      const parser = new DOMParser();

      try{
        const [originalHtml, promptHtml] = await Promise.all([
          fetch(originalUrl).then(response => {
            if(!response.ok) throw new Error('원본 페이지를 불러오지 못했습니다.');
            return response.text();
          }),
          fetch('./brand-prompts.html').then(response => {
            if(!response.ok) throw new Error('브랜드 프롬프트 페이지를 불러오지 못했습니다.');
            return response.text();
          })
        ]);

        const originalDoc = parser.parseFromString(originalHtml, 'text/html');
        const promptDoc = parser.parseFromString(promptHtml, 'text/html');
        const promptWrap = promptDoc.querySelector('.prompt-wrap');

        const extraStyle = originalDoc.createElement('style');
        extraStyle.textContent = `
          .brand-prompt-section{background:linear-gradient(180deg,#f8fbff 0%,#ffffff 100%)}
          .brand-prompt-section .prompt-wrap{display:grid;gap:22px}
          .brand-prompt-section .prompt-block{padding:24px;border:1px solid var(--line);border-radius:22px;background:#fff;box-shadow:0 12px 28px rgba(23,24,33,.05)}
          .brand-prompt-section .prompt-block h2{margin:0 0 14px;font-size:22px;letter-spacing:-.03em;color:var(--ink)}
          .brand-prompt-section .prompt-block pre{margin:0;white-space:pre-wrap;word-break:keep-all;background:#111827;color:#eef2ff;border-radius:18px;padding:22px;line-height:1.7;overflow:auto}
        `;
        originalDoc.head.appendChild(extraStyle);

        const nav = originalDoc.querySelector('.nav');
        const wrapupNav = nav ? nav.querySelector('a[href="#wrapup"]') : null;
        if(nav && !nav.querySelector('a[href="#brand-prompts"]')){
          const link = originalDoc.createElement('a');
          link.href = '#brand-prompts';
          link.textContent = '브랜드기획';
          nav.insertBefore(link, wrapupNav || null);
        }

        const section = originalDoc.createElement('section');
        section.id = 'brand-prompts';
        section.className = 'section brand-prompt-section';
        section.innerHTML = `
          <div class="section-title">
            <p class="number">08</p>
            <h2>브랜드 기획 실습 프롬프트</h2>
            <p>강사 제공 보고서를 기준으로 브랜드 후보 도출, 평가, 최종 선택, 사업계획서, 디자이너 전달용 제안서까지 단계별로 작성합니다.</p>
          </div>
        `;

        if(promptWrap){
          section.appendChild(originalDoc.importNode(promptWrap, true));
        }

        const wrapup = originalDoc.querySelector('#wrapup');
        if(wrapup && wrapup.parentNode){
          wrapup.parentNode.insertBefore(section, wrapup);
          const wrapupNumber = wrapup.querySelector('.number');
          if(wrapupNumber) wrapupNumber.textContent = '09';
        }else{
          originalDoc.querySelector('main').appendChild(section);
        }

        document.open();
        document.write('<!DOCTYPE html>' + originalDoc.documentElement.outerHTML);
        document.close();
      }catch(error){
        document.body.innerHTML = `<div class="loading"><div class="loading-box"><h1>페이지 추가 중 오류가 발생했습니다</h1><p>${error.message}</p></div></div>`;
      }
    })();
  </script>
</body>
</html>
