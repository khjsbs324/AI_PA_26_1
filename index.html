          wrapup.parentNode.insertBefore(section, wrapup);
          wrapup.parentNode.insertBefore(personalitySection, wrapup);
          const wrapupNumber = wrapup.querySelector('.number');
          if(wrapupNumber) wrapupNumber.textContent = '09';
        }else{
          originalDoc.querySelector('main').appendChild(section);
          originalDoc.querySelector('main').appendChild(personalitySection);
        }

        document.open();
        document.write('<!DOCTYPE html>' + originalDoc.documentElement.outerHTML);
        document.close();
      }catch(error){
        document.body.innerHTML = `<div class="loading"><div class="loading-box"><h1>페이지 추가 중 오류가 발생했습니다</h1><p>${error.message}</p></div></div>`;
      }
    })();
  </script>
</body>
</html>
