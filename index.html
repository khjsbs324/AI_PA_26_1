<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT & Gemini 프롬프트 수업</title>
  <style>
    body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:#f8fbff;color:#111827}
    .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .loading-box{max-width:520px;padding:32px;border-radius:24px;background:#fff;box-shadow:0 16px 40px rgba(23,24,33,.08)}
    .loading-box h1{margin:0 0 12px;font-size:28px;letter-spacing:-.04em}
    .loading-box p{margin:0;color:#596276;line-height:1.7}
  </style>
</head>
<body>
  <div class="loading">
    <div class="loading-box">
      <h1>수업페이지를 불러오는 중입니다</h1>
      <p>체크리스트와 AI 강의 업데이트 브리핑 프롬프트를 복사 가능한 카드로 불러옵니다.</p>
    </div>
  </div>

  <script>
    (async function(){
      const sourceUrl = 'https://raw.githubusercontent.com/khjsbs324/AI_PA_26_1/4514b5a841392683772412829a995191ed4c87b1/index.html';
      const briefingPromptUrl = './ai-briefing-prompt.txt';
      const checklistText = `■ 프롬프트 체크리스트

1. 첫 실행 조사 기간이 최근 7일인가?
2. 웹 검색을 실제로 사용했는가?
3. 핵심 업데이트가 3개 이하인가?
4. 중요하지 않은 일반 AI 뉴스가 제외됐는가?
5. 각 항목에 발표일 또는 변경일이 있는가?
6. 발표일과 기사 게시일을 구분했는가?
7. 핵심 정보에 공식 출처가 있는가?
8. 가격·플랜·크레딧을 공식 페이지에서 확인했는가?
9. 순차 배포·베타·국가·요금제 제한을 표시했는가?
10. 강의 자료 반영 필요 여부가 명확한가?
11. 학생 실습 아이디어가 실제 수업에 적용 가능한가?
12. 동일 발표를 여러 항목으로 중복 작성하지 않았는가?
13. 오래된 기사나 재게시 기사가 포함되지 않았는가?
14. 확인 전 정보를 사실처럼 작성하지 않았는가?
15. 직접 연결되는 출처 링크가 정상적으로 열리는가?
16. 주요 정보가 없을 때 지정된 한 문장만 출력하는가?

※ 다음 중 하나라도 발생하면 첫 실행은 실패로 판단합니다.

1. 존재하지 않는 링크
2. 잘못된 가격·날짜·지원 국가
3. 공식 확인이 없는 내용을 공식 확인으로 표시
4. 이전 발표를 신규 발표로 오인
5. 중요 정보를 만들거나 추정하여 작성`;

      try{
        const [sourceHtml, briefingPromptText] = await Promise.all([
          fetch(sourceUrl).then(response => {
            if(!response.ok) throw new Error('기존 수업페이지를 불러오지 못했습니다.');
            return response.text();
          }),
          fetch(briefingPromptUrl).then(response => {
            if(!response.ok) throw new Error('AI 강의 업데이트 브리핑 프롬프트를 불러오지 못했습니다.');
            return response.text();
          })
        ]);

        let html = sourceHtml;

        html = html.replace(
          '      try{\n',
          '      const promptChecklistText = ' + JSON.stringify(checklistText) + ';\n' +
          '      const aiBriefingPromptText = ' + JSON.stringify(briefingPromptText.trim()) + ';\n\n      try{\n'
        );

        html = html.replace(
          '          .personality-section{background:linear-gradient(180deg,#ffffff 0%,#f7f9ff 100%)}\n',
          '          .personality-section{background:linear-gradient(180deg,#ffffff 0%,#f7f9ff 100%)}\n' +
          '          .prompt-checklist-section,.ai-briefing-prompt-section{background:linear-gradient(180deg,#ffffff 0%,#f7f9ff 100%)}\n' +
          '          .prompt-checklist-block,.ai-briefing-prompt-block{padding:24px;border:1px solid var(--line);border-radius:22px;background:#fff;box-shadow:0 12px 28px rgba(23,24,33,.05)}\n' +
          '          .prompt-checklist-block h3,.ai-briefing-prompt-block h3{margin:0 0 14px;color:var(--ink);font-size:22px;line-height:1.4;letter-spacing:-.03em}\n' +
          '          .prompt-checklist-block pre,.ai-briefing-prompt-block pre{margin:0;max-height:760px;white-space:pre-wrap;word-break:keep-all;background:#111827;color:#eef2ff;border-radius:18px;padding:22px;line-height:1.8;overflow:auto}\n' +
          '          .prompt-checklist-block code,.ai-briefing-prompt-block code{display:block;padding-right:38px;font-size:15px}\n' +
          '          #brand-prompts::after{content:none!important;display:none!important}\n'
        );

        const insertedSectionsCode = `        const promptChecklistSection = originalDoc.createElement('section');
        promptChecklistSection.id = 'prompt-checklist';
        promptChecklistSection.className = 'section prompt-checklist-section';
        promptChecklistSection.setAttribute('aria-labelledby', 'prompt-checklist-title');
        promptChecklistSection.innerHTML = \`
          <div class="section-title">
            <p class="number">추가 자료</p>
            <h2 id="prompt-checklist-title">프롬프트 체크리스트</h2>
            <p>첫 실행 결과의 조사 기간, 출처, 최신성, 정확성과 중복 여부를 순서대로 검수합니다.</p>
          </div>
          <article class="prompt-checklist-block">
            <h3>프롬프트 체크리스트 전체</h3>
            <pre><code></code></pre>
          </article>
        \`;
        promptChecklistSection.querySelector('code').textContent = promptChecklistText;

        const aiBriefingPromptSection = originalDoc.createElement('section');
        aiBriefingPromptSection.id = 'ai-briefing-prompt';
        aiBriefingPromptSection.className = 'section ai-briefing-prompt-section';
        aiBriefingPromptSection.setAttribute('aria-labelledby', 'ai-briefing-prompt-title');
        aiBriefingPromptSection.innerHTML = \`
          <div class="section-title">
            <p class="number">추가 자료</p>
            <h2 id="ai-briefing-prompt-title">AI 강의 업데이트 브리핑 프롬프트</h2>
            <p>최신 AI 정보를 웹 검색으로 수집·검증하고, 강의 자료와 학생 실습에 영향을 주는 변화만 선별하는 반복 리서치 프롬프트입니다.</p>
          </div>
          <article class="ai-briefing-prompt-block">
            <h3>AI 강의 업데이트 브리핑 전체 프롬프트</h3>
            <pre><code></code></pre>
          </article>
        \`;
        aiBriefingPromptSection.querySelector('code').textContent = aiBriefingPromptText;

`;

        html = html.replace(
          "        const personalitySection = originalDoc.createElement('section');\n",
          insertedSectionsCode + "        const personalitySection = originalDoc.createElement('section');\n"
        );

        html = html.replace(
          "          wrapup.parentNode.insertBefore(section, wrapup);\n          wrapup.parentNode.insertBefore(personalitySection, wrapup);",
          "          wrapup.parentNode.insertBefore(section, wrapup);\n          wrapup.parentNode.insertBefore(promptChecklistSection, wrapup);\n          wrapup.parentNode.insertBefore(aiBriefingPromptSection, wrapup);\n          wrapup.parentNode.insertBefore(personalitySection, wrapup);"
        );

        html = html.replace(
          "          originalDoc.querySelector('main').appendChild(section);\n          originalDoc.querySelector('main').appendChild(personalitySection);",
          "          originalDoc.querySelector('main').appendChild(section);\n          originalDoc.querySelector('main').appendChild(promptChecklistSection);\n          originalDoc.querySelector('main').appendChild(aiBriefingPromptSection);\n          originalDoc.querySelector('main').appendChild(personalitySection);"
        );

        html = html.replace(
          "        document.open();\n        document.write('<!DOCTYPE html>' + originalDoc.documentElement.outerHTML);",
          "        const heroActions = originalDoc.querySelector('.hero-actions');\n        if(heroActions && !heroActions.querySelector('[data-cert-cbt-link]')){\n          const certButton = originalDoc.createElement('a');\n          certButton.className = 'drive-btn drive-btn-hero';\n          certButton.href = 'https://khjsbs324.github.io/CBT/';\n          certButton.target = '_blank';\n          certButton.rel = 'noopener noreferrer';\n          certButton.setAttribute('data-cert-cbt-link', 'true');\n          certButton.textContent = '자격증 문제 풀이 시작';\n          heroActions.appendChild(certButton);\n        }\n\n        document.open();\n        document.write('<!DOCTYPE html>' + originalDoc.documentElement.outerHTML);"
        );

        document.open();
        document.write(html);
        document.close();
      }catch(error){
        document.body.innerHTML = `<div class="loading"><div class="loading-box"><h1>페이지 수정 중 오류가 발생했습니다</h1><p>${error.message}</p></div></div>`;
      }
    })();
  </script>
</body>
</html>
